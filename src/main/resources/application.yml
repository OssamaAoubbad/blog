spring:
    mail:
        host: ${SPRING_MAIL_HOST}
        port: ${SPRING_MAIL_PORT:465}
        username: ${SPRING_MAIL_USERNAME}
        password: ${SPRING_MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    ssl:
                        enable: true
                transport:
                    protocol: smtp

    application:
        name: blog

    datasource:
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

    thymeleaf:
        cache: false
        encoding: UTF-8
        mode: HTML

    security:
        user:
            name: ${SPRING_DEFAULT_USER}
            password: ${SPRING_DEFAULT_PASSWORD}

    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 10MB

    devtools:
        restart:
            enabled: false

server:
    port: ${PORT:8080}

app:
    base-url: ${APP_BASE_URL}
    mail:
        from: ${MAIL_FROM}

logging:
    level:
        org.springframework.security: DEBUG
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE
        com.blog: DEBUG


resend:
    api:
        key: ${RESEND_API_KEY}

