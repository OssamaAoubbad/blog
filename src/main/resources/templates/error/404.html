<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Page introuvable', currentPage='')}">
<head><title>404</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5 text-center" style="min-height:60vh; display:flex; align-items:center; justify-content:center">
        <div>
            <div style="font-size:5rem; color:#6c757d; font-family:'Playfair Display',serif; font-weight:700">404</div>
            <h1 class="mb-3">Page introuvable</h1>
            <p class="text-muted mb-4">La page que vous recherchez n'existe pas ou a été déplacée.</p>
            <div class="d-flex gap-3 justify-content-center">
                <a th:href="@{/}" class="btn btn-outline-dark">
                    <i class="bi bi-house me-2"></i>Accueil
                </a>
                <a th:href="@{/posts}" class="btn fw-semibold"
                   style="background:#e94560; color:#fff; border-radius:8px">
                    Voir les articles
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
