<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Modifier le profil', currentPage='')}">
<head><title>Modifier le profil</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 style="font-size:2rem">Modifier le profil</h1>
                    <a th:href="@{/users/me}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Retour
                    </a>
                </div>

                <div class="card border-0 shadow-sm p-4">
                    <form th:action="@{/users/me/edit}" th:object="${user}" method="post" enctype="multipart/form-data" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Prénom</label>
                                <input type="text" th:field="*{firstName}" class="form-control"
                                       placeholder="Jean"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nom</label>
                                <input type="text" th:field="*{lastName}" class="form-control"
                                       placeholder="Dupont"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" th:field="*{email}" class="form-control"
                                           th:classappend="${errorMessage != null} ? 'is-invalid'"
                                           placeholder="john@example.com"/>
                                    <div class="invalid-feedback" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Biographie</label>
                                <textarea th:field="*{bio}" rows="4" class="form-control"
                                          placeholder="Parlez-nous de vous..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Photo de profil</label>
                                <div th:if="${user.profilePicture}" class="mb-2">
                                    <img th:src="${user.profilePicture}" alt="Photo profil" class="rounded-circle border"
                                         style="width:72px; height:72px; object-fit:cover"/>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-image"></i></span>
                                    <input type="file" name="profileImageFile" class="form-control"
                                           accept=".jpg,.jpeg,.png,.gif,.webp,image/*"/>
                                </div>
                                <small class="text-muted">Formats: jpg, jpeg, png, gif, webp (max 5MB)</small>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-between align-items-center mt-4 pt-3 border-top">
                            <a th:href="@{/users/me/password}" class="btn btn-link text-muted p-0 small">
                                <i class="bi bi-lock me-1"></i>Changer le mot de passe
                            </a>
                            <div class="d-flex gap-2">
                                <a th:href="@{/users/me}" class="btn btn-outline-secondary">Annuler</a>
                                <button type="submit" class="btn fw-semibold"
                                        style="background:#e94560; color:#fff; border-radius:8px">
                                    <i class="bi bi-check2 me-2"></i>Sauvegarder
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</main>
</body>
</html>
