<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Mot de passe', currentPage='')}">
<head><title>Mot de passe</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 style="font-size:2rem">Mot de passe</h1>
                    <a th:href="@{/users/me}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Retour
                    </a>
                </div>
                <div class="card border-0 shadow-sm p-4">
                    <form th:action="@{/users/me/password}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div th:if="${errorMessage}" class="alert alert-danger">
                            <i class="bi bi-exclamation-circle me-2"></i>
                            <span th:text="${errorMessage}"></span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mot de passe actuel</label>
                            <input type="password" name="currentPassword" class="form-control"
                                   placeholder="********" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nouveau mot de passe</label>
                            <input type="password" name="newPassword" id="newPwd"
                                   class="form-control" placeholder="Min. 8 caractères" required minlength="8"/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirmer le nouveau mot de passe</label>
                            <input type="password" name="confirmPassword" id="confirmPwd"
                                   class="form-control" placeholder="********" required minlength="8"/>
                            <div class="invalid-feedback" id="mismatchFeedback">
                                Les mots de passe ne correspondent pas.
                            </div>
                        </div>

                        <button type="submit" class="btn w-100 fw-semibold"
                                style="background:#e94560; color:#fff; border-radius:8px">
                            <i class="bi bi-lock me-2"></i>Modifier le mot de passe
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const p1 = document.getElementById('newPwd').value;
            const p2 = document.getElementById('confirmPwd').value;
            const fb = document.getElementById('mismatchFeedback');
            const cf = document.getElementById('confirmPwd');
            if (p1 !== p2) {
                e.preventDefault();
                cf.classList.add('is-invalid');
                fb.style.display = 'block';
            }
        });
    </script>
</main>
</body>
</html>
