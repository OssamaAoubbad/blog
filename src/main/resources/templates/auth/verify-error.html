<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Verification invalide', currentPage='')}">
<head><title>Verification invalide</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <div class="mb-3 text-danger"><i class="bi bi-x-circle-fill fs-1"></i></div>
                    <h1 class="h3 mb-2">Lien invalide ou expire</h1>
                    <p class="text-muted mb-4">
                        Le lien de verification est invalide ou deja utilise. Reessayez avec le dernier email recu.
                    </p>
                    <a th:href="@{/auth/login}" class="btn fw-semibold"
                       style="background:#e94560; color:#fff; border-radius:8px;">
                        Retour a la connexion
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
