<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Articles', currentPage='posts')}">
<head><title>Articles</title></head>
<body>
<main th:fragment="main">

    <!-- â”€â”€ Header â”€â”€ -->
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e); padding:3rem 0; color:#fff">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h1 class="mb-1" style="font-size:2.2rem">Tous les articles</h1>
                <p class="text-white-50 mb-0">
                    <span th:text="${totalItems}">0</span> article(s) publié(s)
                </p>
            </div>
            <a th:href="@{/posts/new}" sec:authorize="isAuthenticated()"
               class="btn fw-semibold"
               style="background:#e94560; color:#fff; border-radius:8px; padding:0.6rem 1.4rem">
                <i class="bi bi-plus-lg me-2"></i>Nouvel article
            </a>
        </div>
    </div>

    <div class="container py-5">

        <!-- Barre de recherche -->
        <form th:action="@{/posts}" method="get" class="row g-2 mb-5 justify-content-center">
            <div class="col-md-7">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" name="keyword" class="form-control border-start-0"
                           th:value="${keyword}" placeholder="Rechercher un article..."/>
                    <button class="btn fw-semibold" type="submit"
                            style="background:#e94560; color:#fff">Rechercher</button>
                    <a th:if="${keyword}" th:href="@{/posts}"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-x"></i>
                    </a>
                </div>
            </div>
        </form>

        <!-- Résultat de recherche -->
        <div th:if="${keyword}" class="mb-4">
            <p class="text-muted">
                Résultats pour <strong th:text="${keyword}"></strong> -
                <span th:text="${totalItems}"></span> article(s) trouvé(s)
            </p>
        </div>

        <!-- Grille d'articles -->
        <div class="row g-4" th:if="${!#lists.isEmpty(posts)}">
            <div class="col-md-6 col-lg-4" th:each="post : ${posts}">
                <div class="card h-100 border-0 shadow-sm">

                    <div th:if="${post.coverImage == null}"
                         style="height:150px; background:linear-gradient(135deg,#1a1a2e,#e94560);
                      border-radius:12px 12px 0 0; display:flex; align-items:center;
                      justify-content:center; color:rgba(255,255,255,0.2); font-size:3rem">
                        <i class="bi bi-file-text"></i>
                    </div>
                    <img th:if="${post.coverImage != null}"
                         th:src="${post.coverImage}" alt="cover"
                         class="card-img-top" style="height:150px; object-fit:cover; border-radius:12px 12px 0 0"/>

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" style="font-size:1rem; line-height:1.4">
                            <a th:href="@{/posts/{id}(id=${post.id})}"
                               th:text="${post.title}"
                               class="text-decoration-none text-dark stretched-link"></a>
                        </h5>
                        <p class="card-text text-muted small flex-grow-1"
                           th:text="${#strings.abbreviate(post.summary ?: post.content, 90)}"></p>

                        <div class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
                            <div class="d-flex align-items-center gap-2">
                                <th:block>
                                <img th:if="${post.author.profilePicture != null}" th:src="${post.author.profilePicture}" alt="avatar"
                                     class="rounded-circle" style="width:28px; height:28px; object-fit:cover"/>
                                <div th:if="${post.author.profilePicture == null}" class="rounded-circle d-flex align-items-center justify-content-center"
                                     style="width:28px; height:28px; background:#e94560; color:#fff; font-size:0.75rem; font-weight:700"
                                     th:text="${#strings.substring(post.author.username, 0, 1).toUpperCase()}"></div>
                            </th:block>
                                <small class="text-muted" th:text="${post.author.username}"></small>
                            </div>
                            <div class="d-flex gap-3">
                                <small class="text-muted">
                                    <i class="bi bi-eye me-1"></i><span th:text="${post.viewsCount}"></span>
                                </small>
                                <small class="text-muted">
                                    <i class="bi bi-chat me-1"></i><span th:text="${#lists.size(post.comments)}"></span>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Aucun article -->
        <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5">
            <i class="bi bi-journal-x fs-1 text-muted d-block mb-3"></i>
            <h5 class="text-muted">Aucun article trouvé</h5>
            <p class="text-muted small" th:if="${keyword}">
                Essayez avec d'autres mots-clés.
            </p>
            <a th:href="@{/posts/new}" sec:authorize="isAuthenticated()"
               class="btn btn-sm mt-2" style="background:#e94560; color:#fff; border-radius:8px">
                Écrire le premier article
            </a>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-5 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/posts(page=${currentPage - 1}, keyword=${keyword})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/posts(page=${i}, keyword=${keyword})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/posts(page=${currentPage + 1}, keyword=${keyword})}">&raquo;</a>
                </li>
            </ul>
        </nav>

    </div>
</main>
</body>
</html>
