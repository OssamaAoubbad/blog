<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle=${post.title}, currentPage='')}">
<head><title th:text="${post.title}">Article</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Breadcrumb -->
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Accueil</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/posts}" class="text-decoration-none">Articles</a></li>
                        <li class="breadcrumb-item active" th:text="${post.title}"></li>
                    </ol>
                </nav>

                <!-- Article header -->
                <header class="mb-4">
                    <h1 th:text="${post.title}" style="font-size:clamp(1.8rem,4vw,2.8rem); line-height:1.25"></h1>
                    <p th:if="${post.summary}" th:text="${post.summary}"
                       class="lead text-muted mt-2 mb-3"></p>

                    <div class="d-flex flex-wrap align-items-center gap-3 py-3 border-top border-bottom">
                        <!-- Auteur -->
                        <div class="d-flex align-items-center gap-2">
                            <th:block>
                            <img th:if="${post.author.profilePicture != null}" th:src="${post.author.profilePicture}" alt="avatar"
                                 class="rounded-circle" style="width:38px; height:38px; object-fit:cover"/>
                            <div th:if="${post.author.profilePicture == null}" class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                                 style="width:38px; height:38px; background:#e94560; font-size:0.9rem"
                                 th:text="${#strings.substring(post.author.username,0,1).toUpperCase()}"></div>
                        </th:block>
                            <div>
                                <a th:href="@{/users/{u}(u=${post.author.username})}"
                                   th:text="${post.author.getFullName()}"
                                   class="fw-semibold text-decoration-none text-dark d-block"
                                   style="font-size:0.9rem"></a>
                                <small class="text-muted" th:if="${post.publishedAt}"
                                       th:text="${#temporals.format(post.publishedAt, 'dd MMM yyyy')}"></small>
                            </div>
                        </div>

                    <div class="d-flex gap-3 ms-auto flex-wrap align-items-center">
                        <span class="text-muted small">
                          <i class="bi bi-eye me-1"></i><span th:text="${post.viewsCount}"></span> vues
                        </span>
                        <span class="text-muted small">
                          <i class="bi bi-chat me-1"></i>
                          <span th:text="${#lists.size(post.comments)}"></span> commentaires
                        </span>
                        <span class="text-muted small">
                          <i class="bi bi-hand-thumbs-up me-1"></i>
                          <span th:text="${post.likesCount}"></span> likes
                        </span>
                        <span class="text-muted small">
                          <i class="bi bi-share me-1"></i>
                          <span th:text="${post.sharesCount}"></span> partages
                        </span>
                    </div>
                    </div>
                </header>

                <!-- Cover image -->
                <img th:if="${post.coverImage != null}"
                     th:src="${post.coverImage}" alt="cover"
                     class="img-fluid rounded-3 mb-4 w-100"
                     style="max-height:420px; object-fit:cover"/>

                <!-- Contenu -->
                <article class="mb-5" style="line-height:1.85; font-size:1.05rem"
                         th:utext="${post.content}"></article>

                <!-- Like / partage -->
                <div class="d-flex flex-wrap gap-2 mb-4">
                    <div class="d-flex gap-2" sec:authorize="isAuthenticated()">
                        <form th:if="${likedByCurrentUser}"
                              th:action="@{/posts/{id}/unlike(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-hand-thumbs-up-fill me-1"></i>J'aime déjà
                            </button>
                        </form>
                        <form th:if="${!likedByCurrentUser}"
                              th:action="@{/posts/{id}/like(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-hand-thumbs-up me-1"></i>J'aime
                            </button>
                        </form>
                    </div>
                    <form th:action="@{/posts/{id}/share(id=${post.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-share me-1"></i>Partager
                        </button>
                    </form>
                </div>

                <!-- Actions auteur / admin -->
                <div class="d-flex gap-2 mb-5"
                     th:if="${#authorization.expression('isAuthenticated()')}">
                    <div sec:authorize="isAuthenticated()">
                        <a th:if="${post.author.username == #authentication.name or #authorization.expression('hasRole(''ADMIN'')')}"
                           th:href="@{/posts/{id}/edit(id=${post.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil me-1"></i>Modifier
                        </a>
                    </div>
                    <div sec:authorize="isAuthenticated()">
                        <form th:if="${post.author.username == #authentication.name or #authorization.expression('hasRole(''ADMIN'')')}"
                              th:action="@{/posts/{id}/delete(id=${post.id})}" method="post"
                              onsubmit="return confirm('Supprimer cet article ?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Supprimer
                            </button>
                        </form>
                    </div>
                </div>

                <!-- â”€â”€ Section commentaires â”€â”€ -->
                <section>
                    <h3 class="mb-4" style="font-size:1.4rem">
                        <i class="bi bi-chat-dots me-2"></i>
                        Commentaires (<span th:text="${#lists.size(post.comments)}"></span>)
                    </h3>

                    <!-- Formulaire nouveau commentaire -->
                    <div sec:authorize="isAuthenticated()" class="card border-0 shadow-sm p-4 mb-4">
                        <h6 class="fw-semibold mb-3">Laisser un commentaire</h6>
                        <form th:action="@{/comments/post/{id}(id=${post.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                <textarea name="content" rows="3" class="form-control"
                          placeholder="Partagez votre avis..." required
                          minlength="2" maxlength="1000"></textarea>
                            </div>
                            <button type="submit" class="btn btn-sm fw-semibold"
                                    style="background:#e94560; color:#fff; border-radius:6px">
                                <i class="bi bi-send me-1"></i>Publier
                            </button>
                        </form>
                    </div>

                    <div sec:authorize="isAnonymous()" class="alert alert-light border text-center">
                        <a th:href="@{/auth/login}" class="fw-semibold" style="color:#e94560">Connectez-vous</a>
                        pour laisser un commentaire.
                    </div>

                    <!-- Liste des commentaires -->
                    <div th:if="${#lists.isEmpty(post.comments)}" class="text-muted text-center py-4">
                        <i class="bi bi-chat fs-3 d-block mb-2"></i>
                        Aucun commentaire pour le moment. Soyez le premier !
                    </div>

                    <div th:each="comment : ${post.comments}"
                         th:if="${comment.approved and comment.parent == null}"
                         class="mb-3">
                        <div class="card border-0 shadow-sm p-3">
                            <div class="d-flex gap-3">
                                <th:block>
                                <img th:if="${comment.author.profilePicture != null}" th:src="${comment.author.profilePicture}" alt="avatar"
                                     class="rounded-circle flex-shrink-0" style="width:36px; height:36px; object-fit:cover"/>
                                <div th:if="${comment.author.profilePicture == null}" class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white flex-shrink-0"
                                     style="width:36px; height:36px; background:#1a1a2e; font-size:0.8rem"
                                     th:text="${#strings.substring(comment.author.username,0,1).toUpperCase()}"></div>
                            </th:block>
                                <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                    <span class="fw-semibold" th:text="${comment.author.username}"
                          style="font-size:0.9rem"></span>
                                        <small class="text-muted"
                                               th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}"></small>
                                    </div>
                                    <p class="mb-2" th:text="${comment.content}" style="font-size:0.9rem"></p>

                                    <!-- Actions commentaire -->
                                    <div class="d-flex gap-2">
                                        <!-- Répondre -->
                                        <button class="btn btn-sm btn-link text-muted p-0 text-decoration-none"
                                                style="font-size:0.8rem"
                                                data-bs-toggle="collapse"
                                                th:data-bs-target="'#reply-' + ${comment.id}">
                                            <i class="bi bi-reply me-1"></i>Répondre
                                        </button>
                                        <!-- Supprimer -->
                                        <div sec:authorize="isAuthenticated()">
                                            <form th:if="${comment.author.username == #authentication.name or #authorization.expression('hasRole(''ADMIN'')')}"
                                                  th:action="@{/comments/{id}/delete(id=${comment.id})}" method="post"
                                                  class="d-inline"
                                                  onsubmit="return confirm('Supprimer ce commentaire ?')">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <input type="hidden" name="postId" th:value="${post.id}"/>
                                                <button class="btn btn-sm btn-link text-danger p-0 text-decoration-none"
                                                        style="font-size:0.8rem">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>

                                    <!-- Form réponse -->
                                    <div class="collapse mt-3" th:id="'reply-' + ${comment.id}"
                                         sec:authorize="isAuthenticated()">
                                        <form th:action="@{/comments/post/{postId}/reply/{parentId}(postId=${post.id},parentId=${comment.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <div class="input-group input-group-sm">
                                                <input type="text" name="content" class="form-control"
                                                       placeholder="Votre réponse..." required minlength="2"/>
                                                <button class="btn btn-sm"
                                                        style="background:#e94560; color:#fff" type="submit">
                                                    <i class="bi bi-send"></i>
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <!-- Réponses -->
                                    <div th:if="${!#lists.isEmpty(comment.replies)}" class="mt-3 ps-3 border-start">
                                        <div th:each="reply : ${comment.replies}"
                                             th:if="${reply.approved}"
                                             class="d-flex gap-2 mb-2">
                                            <th:block>
                                            <img th:if="${reply.author.profilePicture != null}" th:src="${reply.author.profilePicture}" alt="avatar"
                                                 class="rounded-circle flex-shrink-0" style="width:28px; height:28px; object-fit:cover"/>
                                            <div th:if="${reply.author.profilePicture == null}" class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white flex-shrink-0"
                                                 style="width:28px; height:28px; background:#6c757d; font-size:0.7rem"
                                                 th:text="${#strings.substring(reply.author.username,0,1).toUpperCase()}"></div>
                                        </th:block>
                                            <div>
                        <span class="fw-semibold" th:text="${reply.author.username}"
                              style="font-size:0.85rem"></span>
                                                <small class="text-muted ms-2"
                                                       th:text="${#temporals.format(reply.createdAt, 'dd MMM HH:mm')}"></small>
                                                <p class="mb-0 mt-1" th:text="${reply.content}"
                                                   style="font-size:0.85rem"></p>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>

                </section>

            </div>
        </div>
    </div>
</main>
</body>
</html>
