<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Mes articles', currentPage='')}">
<head><title>Mes articles</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 style="font-size:2rem">Mes articles</h1>
            <a th:href="@{/posts/new}" class="btn fw-semibold"
               style="background:#e94560; color:#fff; border-radius:8px">
                <i class="bi bi-plus me-1"></i>Nouvel article
            </a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Titre</th>
                        <th>Statut</th>
                        <th>Vues</th>
                        <th>Commentaires</th>
                        <th>Date</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="post : ${posts}">
                        <td>
                            <a th:href="@{/posts/{id}(id=${post.id})}"
                               th:text="${post.title}"
                               class="text-decoration-none fw-semibold text-dark"></a>
                        </td>
                        <td>
                <span class="badge rounded-pill px-3 py-1"
                      th:classappend="'badge-status-' + ${post.status}"
                      th:text="${post.status}"></span>
                        </td>
                        <td><i class="bi bi-eye me-1 text-muted"></i><span th:text="${post.viewsCount}"></span></td>
                        <td><i class="bi bi-chat me-1 text-muted"></i><span th:text="${#lists.size(post.comments)}"></span></td>
                        <td>
                            <small class="text-muted"
                                   th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy')}"></small>
                        </td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <a th:href="@{/posts/{id}(id=${post.id})}"
                                   class="btn btn-sm btn-outline-secondary" title="Voir">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/posts/{id}/edit(id=${post.id})}"
                                   class="btn btn-sm btn-outline-primary" title="Modifier">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post"
                                      onsubmit="return confirm('Supprimer cet article ?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-sm btn-outline-danger" title="Supprimer">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(posts)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-journal-x fs-2 d-block mb-2"></i>
                            Vous n'avez pas encore d'articles.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-4 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/posts/my-posts(page=${currentPage - 1})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/posts/my-posts(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/posts/my-posts(page=${currentPage + 1})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</main>
</body>
</html>
