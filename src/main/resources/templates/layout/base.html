<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle, currentPage)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ? ${pageTitle} + ' - aoubbad-blog' : 'aoubbad-blog'">aoubbad-blog</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap"
          rel="stylesheet"/>

    <style>
        :root {
            --primary:   #1a1a2e;
            --accent:    #e94560;
            --accent-lt: #ff6b81;
            --surface:   #16213e;
            --muted:     #6c757d;
            --light-bg:  #f8f9fc;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light-bg);
            color: #2d2d2d;
        }

        h1, h2, h3, .brand {
            font-family: 'Playfair Display', serif;
        }

        /* â”€â”€ Navbar â”€â”€ */
        .navbar {
            background: var(--primary) !important;
            padding: 1rem 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #fff !important;
            letter-spacing: -0.5px;
        }

        .navbar-brand span { color: var(--accent); }

        .nav-link {
            color: rgba(255,255,255,0.75) !important;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.4rem 0.8rem !important;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: #fff !important;
            background: rgba(255,255,255,0.1);
        }

        .btn-accent {
            background: var(--accent);
            border: none;
            color: #fff;
            font-weight: 500;
            border-radius: 6px;
            padding: 0.4rem 1.1rem;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-accent:hover {
            background: var(--accent-lt);
            color: #fff;
            transform: translateY(-1px);
        }

        .navbar-toggler { border-color: rgba(255,255,255,0.3); }
        .navbar-toggler-icon { filter: invert(1); }

        /* â”€â”€ Search bar â”€â”€ */
        .search-form .form-control {
            border-radius: 20px 0 0 20px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
        }

        .search-form .form-control::placeholder { color: rgba(255,255,255,0.45); }
        .search-form .form-control:focus {
            background: rgba(255,255,255,0.18);
            box-shadow: none;
            color: #fff;
        }

        .search-form .btn {
            border-radius: 0 20px 20px 0;
            border: none;
            background: var(--accent);
            color: #fff;
            padding: 0.4rem 0.9rem;
        }

        /* â”€â”€ Flash messages â”€â”€ */
        .flash-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }

        /* â”€â”€ Footer â”€â”€ */
        footer {
            background: var(--primary);
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            padding: 2rem 0;
            margin-top: 4rem;
        }

        footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
        footer a:hover { color: var(--accent); }

        /* â”€â”€ Cards â”€â”€ */
        .card {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }

        /* â”€â”€ Badges â”€â”€ */
        .badge-status-PUBLISHED { background: #d1fae5; color: #065f46; }
        .badge-status-DRAFT      { background: #fef3c7; color: #92400e; }
        .badge-status-ARCHIVED   { background: #e5e7eb; color: #374151; }
    </style>

    <!-- Page-specific head content -->
    <th:block th:replace="${extraHead} ? ~{${extraHead}} : ~{}"></th:block>
</head>

<body>

<!-- â”€â”€ Navbar â”€â”€ -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" th:href="@{/}">aoubbad-<span>blog</span></a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <!-- Left links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${currentPage == 'home'} ? 'active'">
                        <i class="bi bi-house me-1"></i>Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/posts}" th:classappend="${currentPage == 'posts'} ? 'active'">
                        <i class="bi bi-journal-text me-1"></i>Articles
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/posts/new}">
                        <i class="bi bi-plus-circle me-1"></i>Ecrire
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}" th:classappend="${currentPage == 'admin'} ? 'active'">
                        <i class="bi bi-shield-check me-1"></i>Admin
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MODERATOR') and !hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/comments}" th:classappend="${currentPage == 'admin'} ? 'active'">
                        <i class="bi bi-shield-check me-1"></i>Moderation
                    </a>
                </li>
            </ul>

            <!-- Search -->
            <form class="search-form d-flex me-3" th:action="@{/posts}" method="get">
                <input class="form-control" type="search" name="keyword"
                       placeholder="Rechercher..." th:value="${keyword}"/>
                <button class="btn" type="submit"><i class="bi bi-search"></i></button>
            </form>

            <!-- Right links -->
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/auth/login}">Connexion</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-accent ms-2" th:href="@{/auth/register}">S'inscrire</a>
                </li>

                <!-- Utilisateur connecté -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#" data-bs-toggle="dropdown">
                        <img th:if="${currentUserProfile != null and currentUserProfile.profilePicture != null}"
                             th:src="${currentUserProfile.profilePicture}" alt="avatar"
                             class="rounded-circle" style="width:28px; height:28px; object-fit:cover"/>
                        <i th:if="${currentUserProfile == null or currentUserProfile.profilePicture == null}"
                           class="bi bi-person-circle fs-5"></i>
                        <span sec:authentication="name"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" th:href="@{/users/me}">
                                <i class="bi bi-person me-2"></i>Mon profil
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/posts/my-posts}">
                                <i class="bi bi-file-text me-2"></i>Mes articles
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/users/me/edit}">
                                <i class="bi bi-gear me-2"></i>Parametres
                            </a>
                        </li>
                        <li sec:authorize="hasAnyRole('ADMIN','MODERATOR')"><hr class="dropdown-divider"/></li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item text-danger" th:href="@{/admin}">
                                <i class="bi bi-shield-check me-2"></i>Administration
                            </a>
                        </li>
                        <li sec:authorize="hasRole('MODERATOR') and !hasRole('ADMIN')">
                            <a class="dropdown-item text-danger" th:href="@{/admin/comments}">
                                <i class="bi bi-shield-check me-2"></i>Moderation
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Deconnexion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>

        </div>
    </div>
</nav>

<!-- â”€â”€ Flash messages â”€â”€ -->
<div class="flash-container">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- â”€â”€ Page content â”€â”€ -->
<main th:replace="${content}">
    <!-- Replaced by page content -->
</main>

<!-- â”€â”€ Footer â”€â”€ -->
<footer>
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
        <span class="fw-bold text-white" style="font-family:'Playfair Display',serif">
          aoubbad-<span style="color:var(--accent)">blog</span>
        </span>
                <span class="ms-3" th:text="'© ' + ${#dates.format(#dates.createNow(), 'yyyy')} + ' - Tous droits reserves'"></span>            </div>
            <div class="col-md-6 text-md-end mt-2 mt-md-0">
                <a th:href="@{/}" class="me-3">Accueil</a>
                <a th:href="@{/posts}" class="me-3">Articles</a>
                <a th:href="@{/auth/login}">Connexion</a>
            </div>
        </div>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Auto-dismiss flash messages -->
<script>
    setTimeout(() => {
        document.querySelectorAll('.flash-container .alert').forEach(el => {
            new bootstrap.Alert(el).close();
        });
    }, 4000);
</script>

</body>
</html>
