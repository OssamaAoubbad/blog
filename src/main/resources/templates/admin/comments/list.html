<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::main}, pageTitle='Commentaires - Admin', currentPage='admin')}">
<head><title>Commentaires</title></head>
<body>
<main th:fragment="main">
    <div class="container py-5">

        <div class="mb-4">
            <a th:href="@{/admin}" class="text-muted text-decoration-none small">
                <i class="bi bi-arrow-left me-1"></i>Dashboard
            </a>
            <h1 class="mb-0 mt-1" style="font-size:2rem">
                Modération des commentaires
            </h1>
        </div>

        <div th:if="${#lists.isEmpty(comments)}"
             class="text-center py-5 text-muted">
            <i class="bi bi-chat-square-check fs-1 d-block mb-3"></i>
            <h5>Aucun commentaire en attente</h5>
            <p>Tous les commentaires ont été traités.</p>
        </div>

        <div class="d-flex flex-column gap-3" th:if="${!#lists.isEmpty(comments)}">
            <div class="card border-0 shadow-sm" th:each="comment : ${comments}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white"
                                     style="width:32px; height:32px; background:#1a1a2e; font-size:0.75rem; flex-shrink:0"
                                     th:text="${#strings.substring(comment.author.username,0,1).toUpperCase()}"></div>
                                <div>
                  <span class="fw-semibold" th:text="${comment.author.username}"
                        style="font-size:0.9rem"></span>
                                    <span class="text-muted mx-2 small">sur</span>
                                    <a th:href="@{/posts/{id}(id=${comment.post.id})}"
                                       th:text="${comment.post.title}"
                                       class="small text-decoration-none fw-semibold"></a>
                                </div>
                                <small class="text-muted ms-auto"
                                       th:text="${#temporals.format(comment.createdAt,'dd/MM/yyyy HH:mm')}"></small>
                            </div>
                            <p class="mb-0 ms-5" th:text="${comment.content}"
                               style="font-size:0.9rem"></p>
                        </div>

                        <div class="d-flex gap-2 flex-shrink-0">
                            <!-- Approuver -->
                            <form th:action="@{/admin/comments/{id}/approve(id=${comment.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-success" title="Approuver">
                                    <i class="bi bi-check-lg me-1"></i>Approuver
                                </button>
                            </form>
                            <!-- Rejeter -->
                            <form th:action="@{/admin/comments/{id}/reject(id=${comment.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-outline-warning" title="Rejeter">
                                    <i class="bi bi-x me-1"></i>Rejeter
                                </button>
                            </form>
                            <!-- Supprimer -->
                            <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}" method="post"
                                  onsubmit="return confirm('Supprimer ce commentaire ?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-outline-danger" title="Supprimer">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-4 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/comments(page=${currentPage-1})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/comments(page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages-1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/comments(page=${currentPage+1})}">&raquo;</a>
                </li>
            </ul>
        </nav>

    </div>
</main>
</body>
</html>
